# Hyprland — entrypoint
# Configs modulares en conf/. Edita las que necesites, hyprland.conf raramente cambia.

source = ~/.config/hypr/conf/env.conf
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/general.conf
source = ~/.config/hypr/conf/decorations.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/rules.conf

# Colores dinámicos generados por matugen (si theming dinámico activo).
# install.sh crea un stub vacío para que este source no falle si no usas matugen.
source = ~/.config/hypr/colors.conf
