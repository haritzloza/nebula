# Procesos al iniciar Hyprland

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = hyprshade auto

# Wallpaper: swww-daemon si está, hyprpaper como fallback
exec-once = sh -c 'command -v swww-daemon >/dev/null && swww-daemon || hyprpaper'
exec-once = sh -c 'sleep 1 && ~/.config/hypr/scripts/wallpaper-cycle.sh random'
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Jarvis (asistente local) — solo arranca si el unit existe; daemon + HUD Quickshell
exec-once = sh -c 'systemctl --user list-unit-files jarvis.service >/dev/null 2>&1 && systemctl --user start jarvis.service'
exec-once = sh -c 'command -v qs >/dev/null 2>&1 && [ -d "$HOME/.config/quickshell/jarvis" ] && qs -c jarvis &'

# Aplicar tema GTK y cursor al inicio (gsettings es la API canónica en Wayland)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'catppuccin-mocha-mauve-standard+default'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
