# Keybinds — SUPER = Mod4 (tecla Windows)

$mod = SUPER
$term = kitty
$menu = rofi -show drun -theme ~/.config/rofi/themes/launcher.rasi
$browser = firefox
$claudePopup = ~/.config/hypr/scripts/claude-popup.sh
$claudeScratchpad = kitty --class kitty-claude -e claude

# Apps
bind = $mod, RETURN, exec, $term
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, E, exec, $term -e yazi
bind = $mod, B, exec, $browser
bind = $mod, SPACE, exec, $menu
bind = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Claude
bind = $mod, C, exec, $claudePopup
bind = $mod SHIFT, C, exec, $claudeScratchpad
bind = $mod, F1, togglespecialworkspace, claude

# Jarvis (asistente local por voz) — solo activos si tienes jarvisctl instalado
bind = $mod ALT, J, exec, jarvisctl toggle-listen
bind = $mod ALT SHIFT, J, exec, jarvisctl ptt

# Cheatsheet de keybinds (este popup)
bind = $mod SHIFT, K, exec, ~/.config/hypr/scripts/keybind-cheatsheet.sh

# Layout
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,

# Foco
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Mover ventanas
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse drag
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind = , Print,        exec, hyprshot -m region --clipboard-only
bind = SHIFT, Print,   exec, hyprshot -m output
bind = $mod, Print,    exec, hyprshot -m window

# Lock / logout
bind = $mod, L,        exec, hyprlock
bind = $mod SHIFT, X,  exec, wlogout

# Gaming
bind = $mod, G,        exec, ~/.config/hypr/scripts/gamemode-toggle.sh

# Wallpaper cycle
bind = $mod, W,        exec, ~/.config/hypr/scripts/wallpaper-cycle.sh

# Shader / filtro pantalla (cicla off → blue-light → vibrance → grayscale)
bind = $mod SHIFT, S,  exec, ~/.config/hypr/scripts/shader-toggle.sh

# Volumen / brillo
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindel = , XF86MonBrightnessUp,  exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
