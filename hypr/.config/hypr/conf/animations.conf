animations {
    enabled = true

    # Curvas bezier fluidas
    bezier = overshoot,     0.05, 0.9, 0.1, 1.15
    bezier = smoothOut,     0.36, 0.0, 0.66, -0.56
    bezier = smoothIn,      0.25, 1.0, 0.5, 1.0
    bezier = liquid,        0.34, 1.56, 0.64, 1.0

    animation = windows,        1, 5, overshoot, slide
    animation = windowsOut,     1, 4, smoothOut, slide
    animation = windowsMove,    1, 5, liquid
    animation = border,         1, 8, default
    animation = borderangle,    1, 50, liquid, loop
    animation = fade,           1, 6, smoothIn
    animation = workspaces,     1, 5, overshoot, slidevert
    animation = specialWorkspace, 1, 6, liquid, slidevert
}
