# hyprlock — pantalla de bloqueo
# Lanzar con: SUPER+L  (ver keybinds.conf)

general {
    grace = 2
    hide_cursor = true
    no_fade_in = false
    disable_loading_bar = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.0117
    contrast = 1.1
    brightness = 0.7
    vibrancy = 0.20
    vibrancy_darkness = 0.0
}

# ─── Reloj ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = rgba(205, 214, 244, 0.95)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 220
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
}

# ─── Fecha ───────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d de %B")"
    color = rgba(186, 194, 222, 0.85)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# ─── Usuario ─────────────────────────────────────────────
label {
    monitor =
    text =   $USER
    color = rgba(203, 166, 247, 0.95)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}

# ─── Campo de contraseña ─────────────────────────────────
input-field {
    monitor =
    size = 360, 60
    outline_thickness = 2
    dots_size = 0.30
    dots_spacing = 0.30
    dots_center = true
    outer_color = rgba(203, 166, 247, 0.6)
    inner_color = rgba(30, 30, 46, 0.7)
    font_color = rgba(205, 214, 244, 0.95)
    fade_on_empty = true
    placeholder_text = <i>Contraseña…</i>
    hide_input = false
    check_color = rgba(166, 227, 161, 0.8)
    fail_color  = rgba(243, 139, 168, 0.8)
    fail_text = <b>Fallo ($ATTEMPTS)</b>
    rounding = 14
    position = 0, -190
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# ─── Indicador batería (si aplica) ───────────────────────
label {
    monitor =
    text = cmd[update:30000] bash -c 'B=$(upower -e | grep -m1 BAT); [ -z "$B" ] && exit; P=$(upower -i "$B" | awk "/percentage/ {print \$2}"); printf "  %s" "$P"'
    color = rgba(166, 227, 161, 0.8)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}
