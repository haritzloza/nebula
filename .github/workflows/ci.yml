name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List shell scripts (informational)
        run: |
          find . -type f \
            \( -name '*.sh' -o -name '*.bash' \) \
            -not -path './.git/*' \
            -not -path './wallpapers/aesthetic/*' \
            -not -path './.claude/*' \
            -not -path './.ci/*' \
            | sed 's|^|  |'

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          # SC1090/SC1091  source path resolution (we use runtime paths)
          # SC2155         declare-and-assign (style)
          # SC2034         unused vars (false positives with arrays/dispatchers)
          # SC2148         missing shebang — irrelevant for sourced rc files (.zshrc/.bashrc)
          SHELLCHECK_OPTS: -e SC1090 -e SC1091 -e SC2155 -e SC2034 -e SC2148
        with:
          severity: warning
          ignore_paths: |-
            wallpapers/aesthetic
            .claude
            .ci
          # Ignore rc files individually as well (they're zsh, not bash)
          ignore_names: |-
            .zshrc
            .zprofile
            .bashrc
            .bash_profile

  validate-configs:
    name: validate configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jsonc-parser (jq/python3/node already on ubuntu-latest)
        run: |
          set -e
          mkdir -p .ci
          cd .ci
          npm init -y >/dev/null
          npm install jsonc-parser --no-audit --no-fund --silent

      - name: Verify validators
        run: |
          jq --version
          python3 --version
          python3 -c "import tomllib; print('tomllib OK')"
          node --version

      - name: Validate JSON
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            echo "→ $f"
            if ! jq empty "$f" 2>err.log; then
              echo "::error file=$f::Invalid JSON"
              cat err.log
              fail=1
            fi
          done < <(find . -type f -name '*.json' \
              -not -path './.git/*' \
              -not -path './wallpapers/aesthetic/*' \
              -not -path './.claude/*' \
              -not -path './.ci/*')
          exit "$fail"

      - name: Validate JSONC (config.jsonc)
        run: |
          set -e
          # One-shot Node validator using jsonc-parser (handles comments + trailing commas).
          # Pass file path as argv[2] to avoid shell-interpolation gotchas with filenames.
          cat > /tmp/jsonc-check.cjs <<'NODE'
          const { parse, printParseErrorCode } = require(process.cwd() + '/.ci/node_modules/jsonc-parser');
          const fs = require('fs');
          const f = process.argv[2];
          const errors = [];
          parse(fs.readFileSync(f, 'utf8'), errors, { allowTrailingComma: true });
          if (errors.length) {
            console.error(errors.map(e => 'offset ' + e.offset + ': ' + printParseErrorCode(e.error)).join('\n'));
            process.exit(1);
          }
          NODE
          fail=0
          while IFS= read -r f; do
            echo "→ $f"
            if ! node /tmp/jsonc-check.cjs "$f" 2>err.log; then
              echo "::error file=$f::Invalid JSONC"
              cat err.log
              fail=1
            fi
          done < <(find . -type f -name '*.jsonc' \
              -not -path './.git/*' \
              -not -path './.ci/*' \
              -not -path './.claude/*')
          exit "$fail"

      - name: Validate TOML
        run: |
          set -e
          # tomllib is stdlib in Python 3.11+; ubuntu-latest ships 3.12
          cat > /tmp/toml-check.py <<'PY'
          import sys, tomllib
          try:
              with open(sys.argv[1], 'rb') as fh:
                  tomllib.load(fh)
          except Exception as e:
              print(f'{e}', file=sys.stderr)
              sys.exit(1)
          PY
          fail=0
          while IFS= read -r f; do
            echo "→ $f"
            if ! python3 /tmp/toml-check.py "$f" 2>err.log; then
              echo "::error file=$f::Invalid TOML"
              cat err.log
              fail=1
            fi
          done < <(find . -type f -name '*.toml' \
              -not -path './.git/*' \
              -not -path './wallpapers/aesthetic/*' \
              -not -path './.claude/*' \
              -not -path './.ci/*')
          exit "$fail"

  line-endings:
    name: enforce LF line endings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for CRLF in text files
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if file -b "$f" | grep -q 'CRLF'; then
              echo "::error file=$f::contains CRLF line endings — must be LF"
              fail=1
            fi
          done < <(find . -type f \
              \( -name '*.sh' -o -name '*.conf' -o -name '*.toml' \
              -o -name '*.lua' -o -name '*.json' -o -name '*.jsonc' \
              -o -name '*.css' -o -name '*.rasi' -o -name '*.profile' \
              -o -name '*.service' -o -name '*.timer' \) \
              -not -path './.git/*' -not -path './wallpapers/aesthetic/*' -not -path './.claude/*' -not -path './.ci/*')
          exit "$fail"
