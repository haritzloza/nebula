# SearXNG local para Jarvis — escucha solo en localhost, formato JSON habilitado.
# Gestionado por systemd-user (jarvis-searxng.service); no enabled por defecto.

services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: jarvis-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8888/
      - INSTANCE_NAME=jarvis-local
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
